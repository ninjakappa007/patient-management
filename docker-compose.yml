networks:
  app-tier:
    driver: bridge

services:
  patient-service:
    build: ./patient-service
    ports:
      - "4000:4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/patient-service-db
      SPRING_DATASOURCE_USERNAME: nayaashb
      SPRING_DATASOURCE_PASSWORD: Ashu@9348
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - app-tier
    depends_on:
      - db
      - billing-service
      - analytics-service
      - auth-service

  auth-service:
    build: ./auth-service
    ports:
      - "4003:4003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/auth-service-db
      SPRING_DATASOURCE_USERNAME: nayaashb
      SPRING_DATASOURCE_PASSWORD: Ashu@9348
      JWT_SECRET: "uittcREYpaV8yn1eWQlbiqHRMuVkZFlFZyiNKcbTh+I="
    networks:
      - app-tier

  billing-service:
    build: ./billing-service
    ports:
      - "4001:4001"
      - "9001:9001"
    networks:
      - app-tier

  analytics-service:
    build: ./analytics-service
    ports:
      - "4002:4002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - app-tier

# https://hub:docker:com/_/postgres:
  db:
    image: postgres:16-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: nayaashb
      POSTGRES_PASSWORD: Ashu@9348
      POSTGRES_DB: patient-service-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-tier

# https://hub.docker.com/r/confluentinc/cp-kafka/
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    networks:
      - app-tier
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1


volumes:
  postgres_data:
